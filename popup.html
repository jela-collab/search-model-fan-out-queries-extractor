<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Search Model Fan Out Queries Extractor v3.3</title>
  <style>
    body { font-family: Arial, sans-serif; width: 500px; margin: 0; padding: 16px; background: #f7f7f8; color: #222; }
    h1 { font-size: 17px; margin: 0 0 4px; }
    .description { margin: 0 0 12px; font-size: 12px; color: #555; }
    .branding-box { background: #fff; border: 1px solid #10a37f; border-radius: 8px; padding: 10px; margin-bottom: 15px; text-align: center; font-size: 12px; }
    .branding-box strong { color: #10a37f; font-size: 13px; }
    .branding-box a { color: #0077b5; text-decoration: none; font-weight: bold; }
    .primary-buttons { display: flex; gap: 10px; margin-bottom: 12px; }
    #reloadBtn { background: #10a37f; color: white; flex: 2; }
    #refreshBtn { background: #111; color: white; flex: 1; }
    .secondary-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    button { border: 0; border-radius: 6px; padding: 10px 12px; cursor: pointer; font-size: 13px; font-weight: bold; }
    button.secondary { background: #eee; color: #444; font-weight: normal; padding: 6px 10px; font-size: 11px; }
    .status { margin: 8px 0; font-size: 12px; color: #666; font-style: italic; }
    pre { white-space: pre-wrap; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; height: 250px; overflow: auto; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Search Model Fan Out Queries Extractor v3.3</h1>
  <p class="description">Henter Search Model Fan Out Queries fra den aktive samtale.</p>

  <div class="primary-buttons">
    <button id="reloadBtn">Genindlæs og scan</button>
    <button id="refreshBtn">Opdatér visning</button>
  </div>

  <div class="branding-box">
    <strong>Udviklet af Jonas Egballe Larsen</strong><br>
    Specialiseret i SEO & AI Search<br>
    Lad os netværke: <a href="https://www.linkedin.com/in/jonas-egballe-larsen-55855b146" target="_blank">LinkedIn Profil</a>
  </div>

  <div class="secondary-buttons">
    <button id="copyBtn" class="secondary">Kopiér output</button>
    <button id="copyUniqueBtn" class="secondary">Kopiér unik liste</button>
    <button id="csvBtn" class="secondary">Download CSV</button>
    <button id="clearBtn" class="secondary">Ryd fund</button>
  </div>

  <div id="status" class="status">Klar til scan...</div>
  <pre id="output"></pre>

  <script src="popup.js"></script>
</body>
</html>
